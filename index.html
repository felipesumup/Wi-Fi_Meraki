<script>
  const params = new URLSearchParams(window.location.search);

  const baseGrantUrl = params.get("base_grant_url");
  const continueUrl = params.get("user_continue_url");

  document.getElementById("wifiForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    if (!document.getElementById("accept").checked) {
      alert("Você precisa aceitar os termos | You must accept the terms");
      return;
    }

    const formData = {
      name: document.querySelector('[name="name"]').value,
      email: document.querySelector('[name="email"]').value,
      document: document.querySelector('[name="document"]').value
    };

    try {
      await fetch("https://script.google.com/macros/s/AKfycbykKs_sQknWUplOjsaL3YjD8wi2qd9z-Mdfa6Bn0Qe5RJy4VVg3hQtECSrxeCFs6wI1/exec", {
        method: "POST",
        body: JSON.stringify(formData),
        headers: {
          "Content-Type": "application/json"
        }
      });
    } catch (err) {
      console.error("Erro ao salvar:", err);
    }

    if (baseGrantUrl && continueUrl) {
      window.location.href = baseGrantUrl + "?continue_url=" + encodeURIComponent(continueUrl);
    } else {
      alert("Dados enviados com sucesso. Teste fora do Meraki detectado.");
    }
  });
</script>
